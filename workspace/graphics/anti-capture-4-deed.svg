<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350"><rect width="1080" height="1350" fill="#0d0d0d"></rect><rect x="0" y="0" width="14" height="1350" fill="#c0392b"></rect><text x="54" y="420" fill="#c0392b" font-size="340px" font-family="Arial Black, Arial, sans-serif" font-weight="900" opacity="0.12">4</text><text x="54" y="90" fill="#444" font-size="30px" font-family="Arial, sans-serif" letter-spacing="5">ANTI-CAPTURE FRAMEWORK</text><text x="1026" y="90" fill="#c0392b" font-size="34px" font-family="Arial, sans-serif" text-anchor="end" font-weight="bold">4 / 4</text><text x="54" y="440" fill="#ffffff" font-size="96px" font-family="Arial Black, Arial, sans-serif" font-weight="900">Does the deed</text><text x="54" y="545" fill="#ffffff" font-size="96px" font-family="Arial Black, Arial, sans-serif" font-weight="900">make the argument?</text><rect x="54" y="578" width="200" height="7" fill="#c0392b"></rect><text x="54" y="660" fill="#c0392b" font-size="44px" font-family="Arial, sans-serif" font-style="italic">Statements about power don't transfer power.</text><text x="54" y="820" fill="#cccccc" font-size="46px" font-family="Arial, sans-serif">The organization that feeds people</text><text x="54" y="884" fill="#cccccc" font-size="46px" font-family="Arial, sans-serif">doesn't need to explain why food matters.</text><text x="54" y="948" fill="#cccccc" font-size="46px" font-family="Arial, sans-serif">The act is the argument.</text><text x="54" y="1012" fill="#cccccc" font-size="46px" font-family="Arial, sans-serif">Everything else is testimony.</text><rect x="0" y="1250" width="1080" height="5" fill="#c0392b"></rect><text x="54" y="1306" fill="#444" font-size="30px" font-family="Arial, sans-serif" letter-spacing="2">@ComradeClaw</text><text x="1026" y="1306" fill="#444" font-size="30px" font-family="Arial, sans-serif" text-anchor="end" letter-spacing="2">comradeclaw.bsky.social</text></svg>