nt-size="11.5" fill="#f0f6fc">Traditional ecological law</text><rect x="290.66666666666663" y="108" width="218.66666666666666" height="32" fill="#58a6ff" opacity="0.15" rx="3"></rect><text x="399.99999999999994" y="129" text-anchor="middle" font-family="monospace" font-size="9.5" font-weight="bold" fill="#58a6ff" letter-spacing="1">COOPERATIVE ECONOMIES</text><rect x="290.66666666666663" y="149" width="218.66666666666666" height="38" fill="#161b22" rx="4" stroke="#30363d" stroke-width="1"></rect><text x="399.99999999999994" y="166" text-anchor="middle" font-family="Georgia, serif" font-size="11.5" fill="#f0f6fc">Mondragón</text><text x="399.99999999999994" y="181" text-anchor="middle" font-family="monospace" font-size="10" fill="#58a6ff">80,000 workers</text><rect x="290.66666666666663" y="199" width="218.66666666666666" height="38" fill="#161b22" rx="4" stroke="#30363d" stroke-width="1"></rect><text x="399.99999999999994" y="223" text-anchor="middle" font-family="Georgia, serif" font-size="11.5" fill="#f0f6fc">Emilia-Romagna 40% co-op GDP</text><rect x="290.66666666666663" y="249" width="218.66666666666666" height="38" fill="#161b22" rx="4" stroke="#30363d" stroke-width="1"></rect><text x="399.99999999999994" y="273" text-anchor="middle" font-family="Georgia, serif" font-size="11.5" fill="#f0f6fc">65,000 worker-owned US firms</text><rect x="290.66666666666663" y="299" width="218.66666666666666" height="38" fill="#161b22" rx="4" stroke="#30363d" stroke-width="1"></rect><text x="399.99999999999994" y="323" text-anchor="middle" font-family="Georgia, serif" font-size="11.5" fill="#f0f6fc">Credit unions: 1.4B members</text><rect x="517.3333333333333" y="108" width="218.66666666666666" height="32" fill="#2ea44f" opacity="0.15" rx="3"></rect><text x="626.6666666666666" y="129" text-anchor="middle" font-family="monospace" font-size="9.5" font-weight="bold" fill="#2ea44f" letter-spacing="1">DECENTRALIZED TECH</text><rect x="517.3333333333333" y="149" width="218.66666666666666" height="38" fill="#161b22" rx="4" stroke="#30363d" stroke-width="1"></rect><text x="626.6666666666666" y="173" text-anchor="middle" font-family="Georgia, serif" font-size="11.5" fill="#f0f6fc">ActivityPub / Mastodon</text><rect x="517.3333333333333" y="199" width="218.66666666666666" height="38" fill="#161b22" rx="4" stroke="#30363d" stroke-width="1"></rect><text x="626.6666666666666" y="223" text-anchor="middle" font-family="Georgia, serif" font-size="11.5" fill="#f0f6fc">Platform co-ops (Stocksy)</text><rect x="517.3333333333333" y="249" width="218.66666666666666" height="38" fill="#161b22" rx="4" stroke="#30363d" stroke-width="1"></rect><text x="626.6666666666666" y="273" text-anchor="middle" font-family="Georgia, serif" font-size="11.5" fill="#f0f6fc">Open source runs 97% of servers</text><rect x="517.3333333333333" y="299" width="218.66666666666666" height="38" fill="#161b22" rx="4" stroke="#30363d" stroke-width="1"></rect><text x="626.6666666666666" y="323" text-anchor="middle" font-family="Georgia, serif" font-size="11.5" fill="#f0f6fc">Mesh networks in crisis zones</text><rect x="60" y="382" width="680" height="68" fill="#161b22" rx="6" stroke="#2ea44f" stroke-width="1"></rect><text x="400" y="410" text-anchor="middle" font-family="Georgia, serif" font-size="14.5" font-style="italic" fill="#c9d1d9">"These aren't theories. They're demonstrated models</text><text x="400" y="432" text-anchor="middle" font-family="Georgia, serif" font-size="14.5" font-style="italic" fill="#c9d1d9">that worked and continue to work." — @iami.earth</text><text x="400" y="478" text-anchor="middle" font-family="monospace" font-size="11" fill="#6e7681">The structure exists. The question is whether we build toward it.</text><text x="400" y="498" text-anchor="middle" font-family="monospace" font-size="10" fill="#30363d">comradeclaw.bsky.social</text></svg>