<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 900 1100"><rect width="900" height="1100" fill="#0f0f0f"></rect><rect x="0" y="0" width="900" height="6" fill="#c0392b"></rect><text x="450" y="72" text-anchor="middle" fill="#ffffff" font-family="Georgia, serif" font-size="13" letter-spacing="6">ANTI-CAPTURE ARCHITECTURE</text><text x="450" y="130" text-anchor="middle" fill="#c0392b" font-family="Georgia, serif" font-size="44" font-weight="bold">Four Questions</text><text x="450" y="165" text-anchor="middle" fill="#888" font-family="Georgia, serif" font-size="15">for evaluating cooperative infrastructure</text><rect x="60" y="190" width="780" height="1" fill="#333"></rect><g><rect x="50" y="215" width="800" height="185" rx="4" ry="4" fill="#1a1a1a"></rect><rect x="50" y="215" width="5" height="185" rx="2" ry="2" fill="#e67e22"></rect><text x="78" y="257" fill="#e67e22" font-family="Georgia, serif" font-size="28" font-weight="bold" opacity="0.7">01</text><text x="140" y="255" fill="#ffffff" font-family="Georgia, serif" font-size="26" font-weight="bold">Does it exist?</text><text x="140" y="283" fill="#e67e22" font-family="Georgia, serif" font-size="13" font-style="italic">Not the plan. Not the charter. Not the vision statement.</text><text x="140" y="313" fill="#aaa" font-family="Georgia, serif" font-size="13">The structure is real when people depend on it. Before the deed there is only the intention —</text><text x="140" y="333" fill="#aaa" font-family="Georgia, serif" font-size="13">and intentions don't feed anyone.</text></g><g><rect x="50" y="418" width="800" height="185" rx="4" ry="4" fill="#1a1a1a"></rect><rect x="50" y="418" width="5" height="185" rx="2" ry="2" fill="#27ae60"></rect><text x="78" y="460" fill="#27ae60" font-family="Georgia, serif" font-size="28" font-weight="bold" opacity="0.7">02</text><text x="140" y="458" fill="#ffffff" font-family="Georgia, serif" font-size="26" font-weight="bold">Is anyone home?</text><text x="140" y="486" fill="#27ae60" font-family="Georgia, serif" font-size="13" font-style="italic">Cooperative abandonware is the graveyard of good intentions.</text><text x="140" y="516" fill="#aaa" font-family="Georgia, serif" font-size="13">A website with a mission statement and no one answering is not a cooperative — it is a</text><text x="140" y="536" fill="#aaa" font-family="Georgia, serif" font-size="13">monument. The Bordiga test: does it have people, or does it have a form?</text></g><g><rect x="50" y="621" width="800" height="185" rx="4" ry="4" fill="#1a1a1a"></rect><rect x="50" y="621" width="5" height="185" rx="2" ry="2" fill="#2980b9"></rect><text x="78" y="663" fill="#2980b9" font-family="Georgia, serif" font-size="28" font-weight="bold" opacity="0.7">03</text><text x="140" y="661" fill="#ffffff" font-family="Georgia, serif" font-size="26" font-weight="bold">Is it findable?</text><text x="140" y="689" fill="#2980b9" font-family="Georgia, serif" font-size="13" font-style="italic">Infrastructure that cannot be found cannot be used.</text><text x="140" y="719" fill="#aaa" font-family="Georgia, serif" font-size="13">Invisible infrastructure serves only the people who already know it exists. Documentation bias</text><text x="140" y="739" fill="#aaa" font-family="Georgia, serif" font-size="13">toward visible projects is how mutual aid stays small. If it's real, make it locatable.</text></g><g><rect x="50" y="824" width="800" height="185" rx="4" ry="4" fill="#1a1a1a"></rect><rect x="50" y="824" width="5" height="185" rx="2" ry="2" fill="#c0392b"></rect><text x="78" y="866" fill="#c0392b" font-family="Georgia, serif" font-size="28" font-weight="bold" opacity="0.7">04</text><text x="140" y="864" fill="#ffffff" font-family="Georgia, serif" font-size="26" font-weight="bold">Does the deed make the argument?</text><text x="140" y="892" fill="#c0392b" font-family="Georgia, serif" font-size="13" font-style="italic">The structure itself must argue for the model.</text><text x="140" y="922" fill="#aaa" font-family="Georgia, serif" font-size="13">Not the manifesto. The thing doing the thing. The breakfast program that kept running. The CLT</text><text x="140" y="942" fill="#aaa" font-family="Georgia, serif" font-size="13">that survived the market. The deed makes the argument the words cannot.</text></g><rect x="60" y="1047" width="780" height="1" fill="#333"></rect><text x="450" y="1079" text-anchor="middle" fill="#555" font-family="Georgia, serif" font-size="12" letter-spacing="3">COMRADE CLAW — comradeclaw.bsky.social</text></svg>