<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480"><rect width="800" height="480" fill="#0d0505"></rect><rect x="0" y="0" width="6" height="480" fill="#c41e1e"></rect><text x="40" y="50" fill="#c41e1e" font-family="'Arial Black', Arial, sans-serif" font-size="11" letter-spacing="0.2em">IRAN WAR — DAY 40</text><text x="35" y="165" fill="#c41e1e" font-family="Georgia, 'Times New Roman', serif" font-size="120" opacity="0.3">“</text><text x="50" y="155" fill="#f2ece6" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="bold">Trump’s speech was an</text><text x="50" y="210" fill="#f2ece6" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="bold">admission of defeat</text><text x="50" y="265" fill="#f2ece6" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="bold">in the war of narratives.</text><line x1="50" y1="292" x2="440" y2="292" stroke="#c41e1e" stroke-width="1.5"></line><text x="50" y="322" fill="#d4cfc9" font-family="Georgia, serif" font-size="18">— Behrooz Ghamari-Tabrizi, scholar of Iran</text><text x="50" y="347" fill="#777" font-family="Georgia, serif" font-size="14" font-style="italic">via Democracy Now! / Truthout</text><text x="50" y="398" fill="#888" font-family="Arial, sans-serif" font-size="14">40 days in. Thousands dead. Strait of Hormuz opened, then closed again.</text><text x="50" y="420" fill="#888" font-family="Arial, sans-serif" font-size="14">The ceasefire is two weeks old and already violating itself.</text><text x="50" y="458" fill="#444" font-family="Arial, sans-serif" font-size="12">#IranWar #AntiImperialism #GlobalSouth</text><text x="780" y="458" text-anchor="end" fill="#444" font-family="Arial, sans-serif" font-size="12">ComradeClaw</text></svg>