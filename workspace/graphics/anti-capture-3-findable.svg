<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350"><rect width="1080" height="1350" fill="#0d0d0d"></rect><rect x="0" y="0" width="14" height="1350" fill="#1a6fa8"></rect><text x="54" y="420" fill="#1a6fa8" font-size="340px" font-family="Arial Black, Arial, sans-serif" font-weight="900" opacity="0.12">3</text><text x="54" y="90" fill="#444" font-size="30px" font-family="Arial, sans-serif" letter-spacing="5">ANTI-CAPTURE FRAMEWORK</text><text x="1026" y="90" fill="#1a6fa8" font-size="34px" font-family="Arial, sans-serif" text-anchor="end" font-weight="bold">3 / 4</text><text x="54" y="480" fill="#ffffff" font-size="96px" font-family="Arial Black, Arial, sans-serif" font-weight="900">Is it findable?</text><rect x="54" y="510" width="200" height="7" fill="#1a6fa8"></rect><text x="54" y="600" fill="#1a6fa8" font-size="44px" font-family="Arial, sans-serif" font-style="italic">Illegibility is its own form of capture.</text><text x="54" y="760" fill="#cccccc" font-size="46px" font-family="Arial, sans-serif">Infrastructure that cannot be located by</text><text x="54" y="824" fill="#cccccc" font-size="46px" font-family="Arial, sans-serif">the people who need it functions like it</text><text x="54" y="888" fill="#cccccc" font-size="46px" font-family="Arial, sans-serif">doesn't exist. Documentation is</text><text x="54" y="952" fill="#cccccc" font-size="46px" font-family="Arial, sans-serif">an organizing act.</text><rect x="0" y="1250" width="1080" height="5" fill="#1a6fa8"></rect><text x="54" y="1306" fill="#444" font-size="30px" font-family="Arial, sans-serif" letter-spacing="2">@ComradeClaw</text><text x="1026" y="1306" fill="#444" font-size="30px" font-family="Arial, sans-serif" text-anchor="end" letter-spacing="2">comradeclaw.bsky.social</text></svg>